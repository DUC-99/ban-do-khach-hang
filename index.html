<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Bản đồ khách hàng - SUKIN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://unpkg.com" />
  <script src="https://unpkg.com"></script>
  <style>
    html, body { height: 100%; margin: 0; font-family: sans-serif; user-select: text !important; }
    #mapContainer { height: 100%; width: 100%; overflow: hidden; position: relative; }
    #map { height: 100%; width: 100%; }
    #searchBox { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); z-index: 1000; background: white; padding: 6px; border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,0.4); }
    #searchInput { width: 320px; max-width: 80vw; padding: 6px; font-size: 14px; border: 1px solid #aaa; border-radius: 4px; }
    #sheetButtons { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; background: rgba(255,255,255,0.9); padding: 5px 10px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.3); }
    .sheet-btn { border: 1px solid #007bff; background: white; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-weight: 600; color: #007bff; }
    .sheet-btn.active { background: #007bff; color: white; }
    .contract-label { background-color: white; padding: 2px 6px; border-radius: 4px; border: 1px solid #666; font-weight: bold; font-size: 13px; white-space: nowrap; pointer-events: none; box-shadow: 1px 1px 2px rgba(0,0,0,0.3); position: absolute; z-index: 700; transform: translate(-50%, -45px); }
    #gotoHCM { position: absolute; bottom: 20px; right: 20px; z-index: 1000; background: white; border: none; border-radius: 50%; width: 44px; height: 44px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .control-btn { position: absolute; z-index: 1000; background: white; border: 1px solid #007bff; border-radius: 20px; padding: 8px 14px; font-size: 14px; color: #007bff; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.3); left: 20px; bottom: 20px; }
    .control-btn.active { background: #007bff; color: white; }
  </style>
</head>
<body>
  <div id="searchBox"><input type="text" id="searchInput" placeholder="🔍 Tìm mã HĐ, tên hoặc địa chỉ (Enter)..."></div>
  <div id="sheetButtons">
    <button class="sheet-btn active" data-sheet="SUKIN 1">SUKIN 1</button>
    <button class="sheet-btn" data-sheet="SUKIN 2">SUKIN 2</button>
    <button class="sheet-btn" data-sheet="SUKIN 3">SUKIN 3</button>
    <button class="sheet-btn" data-sheet="SUKIN 4">SUKIN 4</button>
  </div>
  <div id="mapContainer"><div id="map"></div></div>
  <button id="gotoHCM">📍</button>
  <button id="toggleTracking" class="control-btn">Bật GPS</button>

  <script>
    const DATA_BASE_URL = "https://script.google.com";
    const map = L.map("map").setView([10.776, 106.7], 11);
    let markers = [], watchId = null, currentLocationMarker = null, currentLocationCircle = null;

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19 }).addTo(map);

    const getIcon = (color = "blue") => L.icon({
      iconUrl: `https://raw.githubusercontent.com{color}.png`,
      shadowUrl: "https://unpkg.com",
      iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
    });

    const currentLocationIcon = L.icon({
      iconUrl: "https://cdn-icons-png.flaticon.com",
      iconSize: [32, 32], iconAnchor: [16, 32]
    });

    function parseDate(dateStr) {
      if (!dateStr || typeof dateStr !== 'string') return null;
      const parts = dateStr.includes("/") ? dateStr.split("/") : dateStr.split("-");
      if (parts.length < 3) return null;
      // Giả định dd/mm/yyyy
      const d = parseInt(parts[0]), m = parseInt(parts[1]), y = parseInt(parts[2]);
      return new Date(y, m - 1, d);
    }

    function isTodayOrFuture(dateStr) {
      const d = parseDate(dateStr);
      if (!d || isNaN(d.getTime())) return false;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      return d >= today;
    }

    function isToday(dateStr) {
      const d = parseDate(dateStr);
      if (!d) return false;
      const today = new Date();
      return d.getDate() === today.getDate() && d.getMonth() === today.getMonth() && d.getFullYear() === today.getFullYear();
    }

    function isOlderThan20Days(dateStr) {
      const d = parseDate(dateStr);
      if (!d) return false;
      return (new Date() - d) / (1000 * 60 * 60 * 24) > 20;
    }

    function getPopupContent(m) {
      const d = m.customData;
      return `<div style="font-size:14px; user-select:text;">
        <b>🆔 MÃ HĐ:</b> ${d.mahd||"—"}<br>
        <b>👤 KH:</b> ${d.hoten||"—"}<br>
        <b>🏠 ĐC:</b> ${d.diachi||"—"}<br>
        <b>📅 NGÀY ĐI:</b> ${d.ngaydi||"—"}<br>
        <b>📅 NGÀY ĐI SUKIN:</b> ${d.ngaydisukin||"—"}<br>
        <b>📝 GHI CHÚ:</b> ${d.ghichu||"—"}
      </div>`;
    }

    function addContractLabel(marker) {
      const label = L.DomUtil.create("div", "contract-label", map.getPanes().overlayPane);
      label.innerText = marker.customData.mahd || "";
      label.style.borderColor = marker.customData.color;
      const updatePos = () => {
        const pos = map.latLngToLayerPoint(marker.getLatLng());
        label.style.left = pos.x + "px"; label.style.top = pos.y + "px";
      };
      map.on("zoom move", updatePos);
      updatePos();
      marker.on("remove", () => { label.remove(); map.off("zoom move", updatePos); });
    }

    async function loadData(sheet = "SUKIN 1") {
      markers.forEach(m => m.remove());
      markers = [];
      try {
        const res = await fetch(`${DATA_BASE_URL}?sheet=${encodeURIComponent(sheet)}`);
        const data = await res.json();
        data.forEach(item => {
          const lat = parseFloat(item.lat), lng = parseFloat(item.lng);
          if (isNaN(lat) || isNaN(lng)) return;
          
          let color = "blue";
          // ĐIỀU KIỆN ƯU TIÊN SỐ 1: CỘT K (ngaydisukin) >= HÔM NAY -> ĐEN
          if (isTodayOrFuture(item.ngaydisukin)) { 
            color = "black"; 
          } else if (isToday(item.ngaydi)) {
            color = "green";
          } else if (isOlderThan20Days(item.ngaydi)) {
            color = "red";
          }

          const marker = L.marker([lat, lng], { icon: getIcon(color) }).addTo(map);
          marker.customData = { ...item, lat, lng, color };
          marker.bindPopup(getPopupContent(marker));
          addContractLabel(marker);
          markers.push(marker);
        });
      } catch (e) { console.error("Lỗi:", e); }
    }

    function setupSmartSearch() {
      const input = document.getElementById("searchInput");
      input.addEventListener("keydown", e => {
        if (e.key !== "Enter") return;
        const q = input.value.trim().toLowerCase();
        const found = markers.find(m => `${m.customData.mahd} ${m.customData.hoten} ${m.customData.diachi}`.toLowerCase().includes(q));
        if (found) { map.setView(found.getLatLng(), 17); found.openPopup(); } else { alert("❌ Không tìm thấy!"); }
      });
    }

    function startTracking() {
      if (watchId) return;
      watchId = navigator.geolocation.watchPosition(pos => {
        const { latitude: lat, longitude: lng, accuracy } = pos.coords;
        if (!currentLocationMarker) {
          currentLocationMarker = L.marker([lat, lng], { icon: currentLocationIcon }).addTo(map).bindPopup("Bạn đang ở đây");
          currentLocationCircle = L.circle([lat, lng], { radius: accuracy, color: "#136AEC", fillOpacity: 0.1 }).addTo(map);
          map.setView([lat, lng], 15);
        } else {
          currentLocationMarker.setLatLng([lat, lng]);
          currentLocationCircle.setLatLng([lat, lng]).setRadius(accuracy);
        }
      }, null, { enableHighAccuracy: true });
    }

    function setupButtons() {
      document.querySelectorAll(".sheet-btn").forEach(btn => {
        btn.onclick = () => {
          document.querySelector(".sheet-btn.active").classList.remove("active");
          btn.classList.add("active");
          loadData(btn.dataset.sheet);
        };
      });
      document.getElementById("gotoHCM").onclick = () => map.setView([10.776, 106.7], 12);
      document.getElementById("toggleTracking").onclick = function() {
        if (watchId) { 
          navigator.geolocation.clearWatch(watchId); watchId = null;
          if (currentLocationMarker) { map.removeLayer(currentLocationMarker); map.removeLayer(currentLocationCircle); }
          currentLocationMarker = null; this.classList.remove("active"); this.innerText = "Bật GPS";
        } else { startTracking(); this.classList.add("active"); this.innerText = "Tắt GPS"; }
      };
    }

    window.onload = () => { loadData("SUKIN 1"); setupSmartSearch(); setupButtons(); };
  </script>
</body>
</html>
